services:

  collector:
    build: .
    command: python3 collector.py
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./collector.py:/app/collector.py
      - ./analysis.py:/app/analysis.py
      - ./outcome_tracker.py:/app/outcome_tracker.py

  app:
    build: .
    command: python3 app.py
    restart: unless-stopped
    env_file: .env
    ports:
      - "8050:8050"
    volumes:
      - ./data:/app/data
      - ./app.py:/app/app.py
      - ./analysis.py:/app/analysis.py
      - ./assets:/app/assets
    depends_on:
      - collector
